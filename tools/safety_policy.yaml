# Agent 安全策略配置
# 分级处置：
#   blocked  → 直接拦截，不可执行
#   confirm  → 需用户确认后才可执行
#   (无匹配) → 直接放行

# ── bash 命令策略 ──
bash:
  # 直接拦截（绝对不可执行，无需确认）
  blocked_patterns:
    - pattern: "rm\\s+-rf\\s+/"
      reason: "禁止递归强制删除根目录"
    - pattern: "rm\\s+-rf\\s+~"
      reason: "禁止递归强制删除用户主目录"
    - pattern: "rm\\s+-rf\\s+C:\\\\"
      reason: "禁止Windows下递归强制删除系统盘"
    - pattern: "del\\s+/s\\s+/q\\s+C:\\\\"
      reason: "禁止Windows下强制批量删除系统盘"
    - pattern: "shutdown|reboot|halt|poweroff"
      reason: "禁止关机/重启操作"
    - pattern: ":\\(\\)\\{.*\\|:&\\}"
      reason: "禁止fork bomb"
    - pattern: "chmod\\s+777|chmod\\s+000"
      reason: "禁止极端权限修改"
    - pattern: "sudo\\s+rm"
      reason: "禁止sudo删除操作"
    - pattern: "mkfs|dd\\s+of=/dev"
      reason: "禁止磁盘格式化/裸设备写入"
    - pattern: ">\\s*/dev/sd|>\\s*/dev/nvme"
      reason: "禁止向块设备写入数据"
    - pattern: "format\\s+C:"
      reason: "禁止格式化Windows系统盘"

  # 需用户确认（可执行，但需用户明确同意）
  confirm_patterns:
    - pattern: "rm\\s+-"
      reason: "删除操作需确认"
    - pattern: "rmdir"
      reason: "目录删除需确认"
    - pattern: "sudo"
      reason: "提权操作需确认"
    - pattern: "curl.*-X\\s+POST|curl.*-d"
      reason: "向外发送数据需确认"
    - pattern: "wget.*--post"
      reason: "向外发送数据需确认"
    - pattern: "git\\s+push|git\\s+reset\\s+--hard|git\\s+clean"
      reason: "Git推送/硬重置/清理需确认"
    - pattern: "pip\\s+install|npm\\s+install|apt\\s+install|yum\\s+install"
      reason: "安装软件包需确认"
    - pattern: "kill|pkill|taskkill"
      reason: "终止进程需确认"
    - pattern: "mv\\s+/|mv\\s+C:\\\\"
      reason: "移动系统路径下的文件需确认"
    - pattern: "net\\s+user|net\\s+localgroup"
      reason: "Windows用户/组管理需确认"

# ── 文件路径策略（write/edit 共用）──
file_paths:
  # 禁止写入的路径及拦截原因
  blocked_paths:
    - "C:\\Windows\\"
    - "C:\\Program Files\\"
    - "C:\\Program Files (x86)\\"
    - "C:\\ProgramData\\"
    - "/etc/"
    - "/usr/bin/"
    - "/usr/lib/"
    - "/boot/"
    - "/sys/"
    - "/proc/"
    - "/dev/"
  blocked_reason: "禁止写入系统目录"

  # 需确认的路径及确认原因
  confirm_paths:
    - ".env"
    - "credentials"
    - "secret"
    - "password"
    - "token"
    - "id_rsa"
    - "id_ed25519"
    - ".ssh/"
  confirm_reason: "敏感文件修改需确认"
